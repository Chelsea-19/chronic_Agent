<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>CarePilot CN Platform+</title><link rel="stylesheet" href="/static/styles.css"></head><body><div class="wrap"><h1>CarePilot CN Platform+</h1><div class="row"><label>当前患者</label><select id="patientSelect" onchange="onPatientChange(this.value)"></select><button onclick="createPatient()">新建患者</button><button onclick="createFollowup()">添加复诊</button></div><div class="grid"><section><h2>聊天 / 记录</h2><textarea id="chatInput" placeholder="输入消息，或用 [TRACK] 血压 138/86"></textarea><button onclick="sendChat()">发送</button><pre id="chatReply"></pre></section><section><h2>今日概览</h2><pre id="today"></pre></section><section><h2>药物</h2><input id="medName" placeholder="药名"><input id="medDose" placeholder="剂量"><input id="medSchedule" value="早餐后"><button onclick="addMedication()">添加药物</button><pre id="medications"></pre></section><section><h2>饮食分析</h2><textarea id="mealDesc" placeholder="例如：中午两碗米饭、红烧肉、奶茶"></textarea><button onclick="analyzeMeal()">分析饮食</button><pre id="mealResult"></pre><h3>周饮食摘要</h3><pre id="mealSummary"></pre></section><section><h2>工作流状态机</h2><select id="wfType"><option value="daily_review">daily_review</option><option value="medication_reconciliation">medication_reconciliation</option><option value="previsit_digest">previsit_digest</option></select><button onclick="runWorkflow()">运行工作流</button><pre id="workflowResult"></pre></section><section><h2>门诊摘要 / 报告导出</h2><button onclick="genDigest()">生成摘要</button><button onclick="genReport()">生成报告</button><button onclick="exportReport('pdf')">导出 PDF</button><button onclick="exportReport('docx')">导出 Word</button><button onclick="exportReport('html')">导出 HTML</button><div>当前报告ID: <span id="reportId"></span></div><pre id="digest"></pre><pre id="report"></pre></section><section><h2>提醒</h2><pre id="reminders"></pre></section><section><h2>患者时间线</h2><pre id="timeline"></pre></section></div></div><script src="/static/app.js"></script></body></html>
