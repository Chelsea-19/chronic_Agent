## ================================================================
## CarePilot CN Platform+ — Production Docker Compose
## ================================================================
##
## Usage:
##   docker compose -f docker-compose.prod.yml up -d --build
##
## Key differences from dev:
##   - APP_ENV=prod (disables dev-mode auth bypass)
##   - ENABLE_FAKE_LLM=false (requires real LLM key from frontend)
##   - SQLite database file is persisted via named volume
##   - Exports directory is persisted via named volume
##   - Nginx reverse-proxy for TLS termination
##   - Restart policy: always

version: '3.9'

volumes:
  carepilot_data:
    driver: local
  carepilot_exports:
    driver: local
  certbot_conf:
    driver: local
  certbot_www:
    driver: local

services:
  # ── FastAPI Application ──────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      APP_ENV: prod
      APP_NAME: "CarePilot CN Platform+"
      API_PREFIX: /api/v1
      DATABASE_URL: "sqlite:///./data/carepilot_cn.db"
      AUTH_BEARER_TOKEN: "${AUTH_BEARER_TOKEN:?Set AUTH_BEARER_TOKEN in .env}"
      FRONTEND_ORIGIN: "${FRONTEND_ORIGIN:-https://your-domain.com}"
      ENABLE_FAKE_LLM: "false"
      DEFAULT_LLM_MODEL: "${DEFAULT_LLM_MODEL:-gpt-4o-mini}"
      DEFAULT_WINDOW_DAYS: 14
    volumes:
      - carepilot_data:/app/data
      - carepilot_exports:/app/exports
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/v1/healthz').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Background Worker ────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "apps.workers.run"]
    restart: always
    environment:
      APP_ENV: prod
      DATABASE_URL: "sqlite:///./data/carepilot_cn.db"
      AUTH_BEARER_TOKEN: "${AUTH_BEARER_TOKEN:?Set AUTH_BEARER_TOKEN in .env}"
      ENABLE_FAKE_LLM: "false"
      DEFAULT_LLM_MODEL: "${DEFAULT_LLM_MODEL:-gpt-4o-mini}"
      WORKER_POLL_SECONDS: 30
    volumes:
      - carepilot_data:/app/data
      - carepilot_exports:/app/exports

  # ── Nginx Reverse Proxy ──────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_conf:/etc/ssl/carepilot:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy
