## ================================================================
## CarePilot CN Platform+ — Production Nginx Reverse-Proxy Config
## ================================================================
##
## Place this file at /etc/nginx/conf.d/carepilot.conf  (or include it
## from the main nginx.conf).  The upstream FastAPI service is expected
## to be running on port 8000 inside its Docker container.
##
## Usage:
##   1. Put your SSL cert/key at /etc/ssl/carepilot/{cert,key}.pem
##   2. `nginx -t && systemctl reload nginx`

upstream carepilot_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ── HTTP → HTTPS Redirect ───────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ACME challenge (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Server ────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # ─── SSL ─────────────────────────────────────────────────
    ssl_certificate     /etc/ssl/carepilot/cert.pem;
    ssl_certificate_key /etc/ssl/carepilot/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ─── Security Headers ───────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"       always;
    add_header X-Content-Type-Options "nosniff"           always;
    add_header X-XSS-Protection       "1; mode=block"    always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:;" always;

    # ─── Limits ──────────────────────────────────────────────
    client_max_body_size 20M;

    # ─── Reverse Proxy to FastAPI ────────────────────────────
    location / {
        proxy_pass         http://carepilot_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Timeouts for LLM-heavy requests (60s+)
        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    60s;
    }

    # ─── Static Assets (direct serve, bypass FastAPI) ────────
    location /static/ {
        proxy_pass         http://carepilot_api/static/;
        proxy_cache_valid  200 1h;
        expires            1h;
        add_header Cache-Control "public, no-transform";
    }

    # ─── Health Check (no auth) ──────────────────────────────
    location = /api/v1/healthz {
        proxy_pass http://carepilot_api;
    }

    # ─── Deny dotfiles ───────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
